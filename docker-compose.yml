version: '3.8'

services:
  postgres:
    build: ./infra/postgres
    container_name: pia_postgres
    restart: always
    environment:
      POSTGRES_USER: pia
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pia
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pia_pgdata:/var/lib/postgresql/data
    command: >
      postgres 
      -c shared_preload_libraries='timescaledb,pg_cron,age'
      -c cron.database_name='pia'
      -c max_connections=200
      -c shared_buffers=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pia -d pia"]
      interval: 10s
      timeout: 5s
      retries: 5

  pia_init:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: pia_init
    volumes:
      - .:/app
    command: ["python", "scripts/validate_system.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - PGPASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy

  seismic_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: seismic_agent
    restart: always
    volumes:
      - .:/app
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  news_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: news_agent
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/news_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  analyst_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    deploy:
      replicas: 3
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/analyst_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      pia_init:
        condition: service_completed_successfully

  enrichment_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: enrichment_agent
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/enrichment_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      pia_init:
        condition: service_completed_successfully

  maritime_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: maritime_agent
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/maritime_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  aviation_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: aviation_agent
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/aviation_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  document_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: document_agent
    restart: always
    volumes:
      - .:/app
      - ./data/documents:/app/data/documents
    command: ["python", "src/pia/agents/document_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  mcp_server:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: mcp_server
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/api/mcp_server.py"]
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  telegram_voice:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: telegram_voice
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    command: ["python", "src/pia/api/telegram_voice.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_TELEGRAM_USER_IDS=${ALLOWED_TELEGRAM_USER_IDS}
    depends_on:
      pia_init:
        condition: service_completed_successfully

  api_bridge:
    build:
      context: ../pia-api
      dockerfile: Dockerfile
    container_name: pia_api_bridge
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pia_pgdata:
