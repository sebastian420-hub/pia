version: '3.8'

services:
  postgres:
    build: ./infra/postgres
    container_name: pia_postgres
    restart: always
    environment:
      POSTGRES_USER: pia
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pia
    ports:
      - "5432:5432"
    volumes:
      - pia_pgdata:/var/lib/postgresql/data
    command: >
      postgres 
      -c shared_preload_libraries='timescaledb,pg_cron,age'
      -c cron.database_name='pia'
      -c max_connections=200
      -c shared_buffers=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pia -d pia"]
      interval: 10s
      timeout: 5s
      retries: 5

  seismic_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: seismic_agent
    restart: always
    volumes:
      - ./tests:/app/tests
      - ./database:/app/database
      - ./scripts:/app/scripts
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pia_pgdata:
