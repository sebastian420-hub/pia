version: '3.8'

services:
  postgres:
    build: ./infra/postgres
    container_name: pia_postgres
    restart: always
    environment:
      POSTGRES_USER: pia
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pia
    ports:
      - "5432:5432"
    volumes:
      - pia_pgdata:/var/lib/postgresql/data
    command: >
      postgres 
      -c shared_preload_libraries='timescaledb,pg_cron,age'
      -c cron.database_name='pia'
      -c max_connections=200
      -c shared_buffers=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pia -d pia"]
      interval: 10s
      timeout: 5s
      retries: 5

  pia_init:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: pia_init
    volumes:
      - .:/app
    command: ["python", "scripts/validate_system.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
      - PGPASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy

  seismic_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: seismic_agent
    restart: always
    volumes:
      - .:/app
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  analyst_agent:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: analyst_agent
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/agents/analyst_agent.py"]
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

  mcp_server:
    build:
      context: .
      dockerfile: ./infra/agents/Dockerfile
    container_name: mcp_server
    restart: always
    volumes:
      - .:/app
    command: ["python", "src/pia/api/mcp_server.py"]
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_USER=pia
      - DB_PASSWORD=password
      - DB_NAME=pia
    depends_on:
      pia_init:
        condition: service_completed_successfully

volumes:
  pia_pgdata:
